image: node:20

pipelines:
  default:
    - step:
        name: Frontend Build
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build
    - step:
        name: Backend Test
        caches:
          - node
        script:
          - cd backend
          - npm ci
          - npm test
    - step:
        name: Deploy to Production
        deployment: production
        trigger: manual
        script:
          - echo "Frontend deploys via Vercel; backend via Render (auto-deploy on push)."
          # Optionally trigger a Render deploy hook:
          # - curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
